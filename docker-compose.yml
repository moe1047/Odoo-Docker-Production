# Odoo 18 — db + web (always). Apache only with --profile production.
#
# Production:  make prod   (or ./prod)
# Development: make dev    (or ./dev)

networks:
  odoo:
    driver: bridge

services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    ports:
      # Localhost only — never expose Postgres to the public internet
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build: .
    image: odoo-docker-production:18
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Odoo image reads HOST/USER/PASSWORD (do not rely on .env alone — HOST conflicts on some shells)
      HOST: db
      USER: ${POSTGRES_USER}
      PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons
      - ./ent:/mnt/ent-addons
    expose:
      - "8069"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # Soft ceiling — adjust to your VPS RAM (leave ~3 GB for db + OS on 12 GB box)
    mem_limit: 8g

  apache:
    profiles: [production]
    image: httpd:2.4
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    networks:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/vhosts/odoo.conf:/usr/local/apache2/conf/extra/vhosts/odoo.conf:ro
      - ./certs:/usr/local/apache2/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 512m

volumes:
  odoo-db-data:
  odoo-web-data:
