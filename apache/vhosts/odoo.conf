# Copy and edit ServerName + cert paths for your domain.
# Place certs in ./certs/  (see certs/README.md)

# --- HTTP → HTTPS ---
<VirtualHost *:80>
    ServerName odoo.example.com
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- HTTPS → Odoo ---
<VirtualHost *:443>
    ServerName odoo.example.com

    SSLEngine on
    SSLCertificateFile    /usr/local/apache2/certs/fullchain.pem
    SSLCertificateKeyFile /usr/local/apache2/certs/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # Live chat / bus notifications
    ProxyPass        /websocket ws://web:8069/websocket retry=0 timeout=300
    ProxyPassReverse /websocket ws://web:8069/websocket

    ProxyPass        / http://web:8069/ retry=0 timeout=300
    ProxyPassReverse / http://web:8069/
</VirtualHost>
